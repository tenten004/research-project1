seed: 42

data:
  data_dir: data/grade_by_modality_axial_9_15/FL
  image_size: 224
  mean: 0.5
  std: 0.5
  num_workers: 0

train:
  batch_size: 16
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  sampler:
    type: none

loss:
  name: cross_entropy
  class_weighting: inverse
  effective_beta: 0.9999
  label_smoothing: 0.0
  power: 1.0

augmentation:
  enabled: true
  rotation: 10
  hflip: 0.5
  vflip: 0.0
  brightness: 0.05
  contrast: 0.1
  gamma_min: 0.9
  gamma_max: 1.1
  minority:
    classes: [3, 4]
    multiplier: 1.2

model:
  vit_name: vit_base_patch16_224
  num_classes: 5

output:
  output_dir: outputs/grade_vit_axial_9_15/fl
